<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FleetTrack - Travels & MySQL GPS Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body class="bg-gray-50 font-sans antialiased text-gray-900">

    <!-- NAVIGATION BAR -->
    <nav class="bg-indigo-600 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center space-x-2">
                    <i class="fa-solid fa-cab text-2xl text-yellow-400"></i>
                    <span class="font-bold text-xl tracking-tight">FleetTrack Travels</span>
                </div>
                <div class="flex space-x-2">
                    <button onclick="switchView('customer-view')" class="nav-btn bg-indigo-700 px-3 py-2 rounded-md text-sm font-medium hover:bg-indigo-800 transition">Customer Booking</button>
                    <button onclick="switchView('driver-view')" class="nav-btn px-3 py-2 rounded-md text-sm font-medium hover:bg-indigo-500 transition">Driver Portal</button>
                    <button onclick="switchView('admin-view')" class="nav-btn px-3 py-2 rounded-md text-sm font-medium hover:bg-indigo-500 transition">Admin Dashboard</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8">

        <!-- ================= CUSTOMER BOOKING INTERFACE ================= -->
        <section id="customer-view" class="view-section space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h2 class="text-2xl font-bold text-gray-800 mb-4"><i class="fa-solid fa-route text-indigo-600 mr-2"></i>Book Your Ride</h2>
                <form id="booking-form" class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Your Name</label>
                        <input type="text" id="cust-name" required class="w-full rounded-md border-gray-300 shadow-sm p-2.5 bg-gray-50 border focus:ring-2 focus:ring-indigo-500" placeholder="John Doe">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Pickup Location</label>
                        <input type="text" id="cust-pickup" required class="w-full rounded-md border-gray-300 shadow-sm p-2.5 bg-gray-50 border focus:ring-2 focus:ring-indigo-500" placeholder="Enter Pickup Address">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Drop Location</label>
                        <input type="text" id="cust-drop" required class="w-full rounded-md border-gray-300 shadow-sm p-2.5 bg-gray-50 border focus:ring-2 focus:ring-indigo-500" placeholder="Enter Destination">
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 text-white font-medium p-2.5 rounded-md hover:bg-indigo-700 shadow transition">
                        Confirm Booking
                    </button>
                </form>
            </div>
        </section>

        <!-- ================= DRIVER PORTAL & GPS EMULATOR ================= -->
        <section id="driver-view" class="view-section hidden space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 max-w-md mx-auto">
                <div class="text-center mb-6">
                    <h2 class="text-2xl font-bold text-gray-800"><i class="fa-solid fa-location-crosshairs text-emerald-600 mr-2"></i>Driver GPS Portal (MySQL)</h2>
                </div>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Select Your Vehicle</label>
                        <select id="driver-car-select" class="w-full rounded-md border border-gray-300 p-2.5 bg-gray-50">
                            <option value="Sedan - Car 1">Sedan - Car 1 (Driver A)</option>
                            <option value="SUV - Car 2">SUV - Car 2 (Driver B)</option>
                            <option value="Hatchback - Car 3">Hatchback - Car 3 (Driver C)</option>
                            <option value="Luxury - Car 4">Luxury - Car 4 (Driver D)</option>
                        </select>
                    </div>

                    <div class="p-4 bg-emerald-50 text-emerald-900 rounded-lg flex items-center justify-between">
                        <div>
                            <p class="font-semibold text-sm">GPS Engine Status</p>
                            <p id="gps-status-text" class="text-xs text-emerald-700">Awaiting transmission activation...</p>
                        </div>
                        <span id="gps-indicator" class="h-3 w-3 rounded-full bg-gray-400 animate-pulse"></span>
                    </div>

                    <button onclick="toggleGpsTracking()" id="gps-toggle-btn" class="w-full bg-emerald-600 text-white font-medium p-3 rounded-md hover:bg-emerald-700 shadow transition">
                        Start Sharing Live Location
                    </button>
                </div>
            </div>
        </section>

        <!-- ================= ADMIN LIVE DASHBOARD ================= -->
        <section id="admin-view" class="view-section hidden space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-white p-4 rounded-xl border border-gray-100 shadow-sm flex items-center space-x-4">
                    <div class="p-3 rounded-lg bg-indigo-100 text-indigo-600"><i class="fa-solid fa-car text-xl"></i></div>
                    <div><p class="text-sm text-gray-500 font-medium">Total Fleet</p><p class="text-xl font-bold">4 Vehicles</p></div>
                </div>
                <div class="bg-white p-4 rounded-xl border border-gray-100 shadow-sm flex items-center space-x-4">
                    <div class="p-3 rounded-lg bg-green-100 text-green-600"><i class="fa-solid fa-signal text-xl"></i></div>
                    <div><p class="text-sm text-gray-500 font-medium">Tracking Status</p><p id="admin-online-count" class="text-xl font-bold">Connected to MySQL</p></div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 bg-white p-4 rounded-xl border border-gray-100 shadow-sm space-y-3">
                    <h3 class="text-lg font-bold text-gray-800"><i class="fa-solid fa-map-location-dot text-indigo-600 mr-2"></i>MySQL Live Map</h3>
                    <div id="map" class="w-full h-96 rounded-lg z-10 border border-gray-200"></div>
                </div>

                <div class="bg-white p-4 rounded-xl border border-gray-100 shadow-sm space-y-4">
                    <h3 class="text-lg font-bold text-gray-800"><i class="fa-solid fa-list-check text-indigo-600 mr-2"></i>Fleet Positions</h3>
                    <div id="fleet-list-container" class="divide-y divide-gray-100 space-y-3">
                        <!-- Content rendered dynamically via API fetch updates -->
                        <p class="text-sm text-gray-400">Loading tracking array data...</p>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <script>
        const API_URL = 'http://localhost:3000/api';
        let watchId = null;
        let activeTrackingCar = null;
        let adminIntervalId = null;

        // Initialize Map
        const map = L.map('map').setView([17.3850, 78.4867], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        const vehicleMarkers = {};

        function switchView(viewId) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden'));
            document.getElementById(viewId).classList.remove('hidden');
            
            // Clear or start admin polling loop based on view choice
            clearInterval(adminIntervalId);
            if(viewId === 'admin-view') {
                setTimeout(() => { map.invalidateSize(); }, 200);
                pollFleetStatus();
                adminIntervalId = setInterval(pollFleetStatus, 5000); // Pool position updates every 5 seconds
            }
        }

        // Driver Tracking Action
        function toggleGpsTracking() {
            const selectedCar = document.getElementById('driver-car-select').value;
            const btn = document.getElementById('gps-toggle-btn');
            const statusText = document.getElementById('gps-status-text');

            if (watchId === null) {
                activeTrackingCar = selectedCar;
                watchId = navigator.geolocation.watchPosition(async (position) => {
                    const { latitude, longitude } = position.coords;
                    statusText.innerText = `Sending: ${latitude.toFixed(4)}, ${longitude.toFixed(4)}`;
                    
                    // Fire update directly to Node-MySQL engine
                    await fetch(`${API_URL}/gps/update`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ car_name: activeTrackingCar, latitude, longitude })
                    });
                }, err => statusText.innerText = `Error: ${err.message}`, { enableHighAccuracy: true });

                btn.innerText = "Stop Sharing Location";
                btn.classList.replace('bg-emerald-600', 'bg-red-600');
            } else {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
                statusText.innerText = "Awaiting transmission activation...";
                btn.innerText = "Start Sharing Live Location";
                btn.classList.replace('bg-red-600', 'bg-emerald-600');
            }
        }

        // Admin: Pull data loop from Node MySQL Server
        async function pollFleetStatus() {
            try {
                const response = await fetch(`${API_URL}/fleet/status`);
                const cars = await response.json();
                
                const container = document.getElementById('fleet-list-container');
                container.innerHTML = '';

                cars.forEach(car => {
                    // Update Text Feed
                    const div = document.createElement('div');
                    div.className = 'pt-2';
                    div.innerHTML = `
                        <div class="flex justify-between text-sm font-bold"><span>${car.car_name}</span><span class="text-indigo-600">${car.status}</span></div>
                        <p class="text-xs text-gray-400">Lat: ${car.latitude ? car.latitude.toFixed(4) : 'N/A'}, Lng: ${car.longitude ? car.longitude.toFixed(4) : 'N/A'}</p>
                    `;
                    container.appendChild(div);

                    // Update Map Marker positions
                    if (car.latitude && car.longitude) {
                        if (vehicleMarkers[car.car_name]) {
                            vehicleMarkers[car.car_name].setLatLng([car.latitude, car.longitude]);
                        } else {
                            vehicleMarkers[car.car_name] = L.marker([car.latitude, car.longitude])
                                .addTo(map).bindPopup(`<b>${car.car_name}</b><br>${car.driver_name}`);
                        }
                    }
                });
            } catch (err) {
                console.error("Failed to connect to MySQL backend service framework:", err);
            }
        }

        // Customer Booking Submission
        document.getElementById('booking-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const data = {
                customer_name: document.getElementById('cust-name').value,
                pickup_location: document.getElementById('cust-pickup').value,
                drop_location: document.getElementById('cust-drop').value
            };

            await fetch(`${API_URL}/bookings/create`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            alert('Booking submitted to your MySQL Database system container!');
            this.reset();
        });
    </script>
</body>
</html>
